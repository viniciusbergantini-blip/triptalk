<!DOCTYPE html>

<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TripTalk</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3b82f6">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

:root {
  --blue: #3b82f6;
  --indigo: #4f46e5;
  --green: #22c55e;
  --orange: #fb923c;
  --purple: #6366f1;
  --red: #ef4444;
  --pink: #ec4899;
  --cyan: #06b6d4;
  --violet: #a855f7;
  --amber: #f97316;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: 'Nunito', system-ui, sans-serif;
  background: linear-gradient(145deg, #1e1b4b 0%, #312e81 40%, #1d4ed8 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── SPLASH ── */
.splash {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(145deg, #1e1b4b 0%, #312e81 40%, #1d4ed8 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 0.03em;
  z-index: 10;
  gap: 6px;
}

.splash img {
  filter: drop-shadow(0 0 30px rgba(99,102,241,0.7));
  animation: splashFloat 1.5s ease-in-out infinite alternate;
}

@keyframes splashFloat {
  from { transform: translateY(0px); }
  to   { transform: translateY(-8px); }
}

.splash-sub {
  font-size: 15px;
  font-weight: 600;
  opacity: 0.6;
  margin-top: 4px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* ── APP CARD ── */
.app {
  width: 420px;
  max-width: 95%;
  background: #ffffff;
  border-radius: 28px;
  padding: 28px 24px;
  box-shadow:
    0 25px 60px rgba(0,0,0,0.35),
    0 0 0 1px rgba(255,255,255,0.08);
  text-align: center;
  display: none;
  animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── TYPOGRAPHY ── */
h1 {
  font-size: 26px;
  font-weight: 900;
  color: #1e1b4b;
  margin: 6px 0 4px;
  letter-spacing: -0.02em;
}

h2 {
  font-size: 20px;
  font-weight: 800;
  color: #1e1b4b;
  margin: 6px 0 4px;
  letter-spacing: -0.01em;
}

h3 {
  font-size: 16px;
  font-weight: 700;
  color: #374151;
  margin: 4px 0;
}

p {
  color: #6b7280;
  font-size: 14px;
  font-weight: 600;
  line-height: 1.5;
  margin: 6px 0;
}

/* ── LOGO ── */
.logo {
  width: 120px;
  margin-bottom: 10px;
  filter: drop-shadow(0 4px 12px rgba(99,102,241,0.3));
}

/* ── BUTTONS ── */
button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 800;
  font-family: 'Nunito', system-ui, sans-serif;
  cursor: pointer;
  color: white;
  letter-spacing: 0.02em;
  transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
  position: relative;
  overflow: hidden;
}

button::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 40%;
  background: rgba(255,255,255,0.12);
  border-radius: 14px 14px 40% 40%;
  pointer-events: none;
}

button:active {
  transform: scale(0.97);
  filter: brightness(0.92);
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.18);
}

.green  { background: linear-gradient(160deg, #22c55e, #16a34a); box-shadow: 0 4px 15px rgba(34,197,94,0.35); }
.blue   { background: linear-gradient(160deg, #3b82f6, #2563eb); box-shadow: 0 4px 15px rgba(59,130,246,0.35); }
.orange { background: linear-gradient(160deg, #fb923c, #ea580c); box-shadow: 0 4px 15px rgba(251,146,60,0.35); }
.purple { background: linear-gradient(160deg, #6366f1, #4338ca); box-shadow: 0 4px 15px rgba(99,102,241,0.35); }

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 16px;
}

/* ── CATEGORY CARDS ── */
.card {
  padding: 20px 12px;
  border-radius: 16px;
  color: white;
  font-weight: 800;
  font-size: 14px;
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
  position: relative;
  overflow: hidden;
  letter-spacing: 0.01em;
}

.card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 45%;
  background: rgba(255,255,255,0.15);
  border-radius: 16px 16px 50% 50%;
  pointer-events: none;
}

.card:hover  { transform: scale(1.06) translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
.card:active { transform: scale(0.97); }

.airport      { background: linear-gradient(145deg, #3b82f6, #1d4ed8); box-shadow: 0 4px 12px rgba(59,130,246,0.4); }
.hotel        { background: linear-gradient(145deg, #ef4444, #b91c1c); box-shadow: 0 4px 12px rgba(239,68,68,0.4); }
.restaurant   { background: linear-gradient(145deg, #22c55e, #15803d); box-shadow: 0 4px 12px rgba(34,197,94,0.4); }
.transport    { background: linear-gradient(145deg, #6366f1, #4338ca); box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
.shopping     { background: linear-gradient(145deg, #ec4899, #be185d); box-shadow: 0 4px 12px rgba(236,72,153,0.4); }
.tourism      { background: linear-gradient(145deg, #06b6d4, #0e7490); box-shadow: 0 4px 12px rgba(6,182,212,0.4); }
.conversation { background: linear-gradient(145deg, #a855f7, #7e22ce); box-shadow: 0 4px 12px rgba(168,85,247,0.4); }
.emergency    { background: linear-gradient(145deg, #f97316, #c2410c); box-shadow: 0 4px 12px rgba(249,115,22,0.4); }

/* ── POINTS BADGE ── */
.points-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: linear-gradient(135deg, #fef3c7, #fde68a);
  color: #92400e;
  font-weight: 800;
  font-size: 14px;
  padding: 5px 14px;
  border-radius: 999px;
  margin: 6px 0 12px;
  border: 1px solid #fcd34d;
}

/* ── INPUT ── */
input {
  padding: 13px 16px;
  width: 90%;
  border: 2px solid #e5e7eb;
  border-radius: 12px;
  font-size: 16px;
  font-family: 'Nunito', system-ui, sans-serif;
  font-weight: 700;
  color: #1e1b4b;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  margin-top: 8px;
  display: block;
  margin-left: auto;
  margin-right: auto;
}

input:focus {
  border-color: #6366f1;
  box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
}

/* ── PROGRESS BAR ── */
.progressBar {
  width: 100%;
  height: 8px;
  background: #f3f4f6;
  border-radius: 999px;
  margin: 10px 0;
  overflow: hidden;
}

.progressFill {
  height: 8px;
  background: linear-gradient(90deg, #22c55e, #16a34a);
  border-radius: 999px;
  transition: width 0.5s ease;
  box-shadow: 0 0 8px rgba(34,197,94,0.4);
}

/* ── LESSON PHRASE ── */
.phrase-box {
  background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
  border: 1.5px solid #bae6fd;
  border-radius: 18px;
  padding: 20px 16px;
  margin: 12px 0;
}

.phrase-en {
  font-size: 22px;
  font-weight: 900;
  color: #1e1b4b;
  letter-spacing: -0.02em;
  line-height: 1.3;
  margin-bottom: 0;
}

.pron-box {
  background: #f9fafb;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  padding: 10px 14px;
  margin: 10px 0;
}

.pron-label {
  font-size: 11px;
  font-weight: 800;
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 3px;
}

.pron-text {
  font-size: 16px;
  font-weight: 700;
  color: #374151;
}

.pt-text {
  font-size: 15px;
  font-weight: 700;
  color: #6b7280;
  margin: 4px 0 10px;
}

/* ── MODULE TITLE BADGE ── */
.module-title {
  display: inline-block;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #6366f1;
  background: #eef2ff;
  padding: 4px 12px;
  border-radius: 999px;
  margin-bottom: 6px;
}

/* ── QUIZ OPTIONS ── */
.quizOption {
  background: #f9fafb;
  border: 2px solid #e5e7eb;
  padding: 13px 16px;
  border-radius: 12px;
  margin-top: 10px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  color: #374151;
  font-family: 'Nunito', system-ui, sans-serif;
  transition: all 0.15s;
  text-align: left;
}

.quizOption:hover {
  background: #eef2ff;
  border-color: #6366f1;
  color: #4338ca;
  transform: translateX(3px);
}

.quizOption:active {
  transform: scale(0.98);
}

/* ── RESULT SCREENS ── */
.result-correct {
  background: linear-gradient(135deg, #f0fdf4, #dcfce7);
  border: 2px solid #86efac;
  border-radius: 20px;
  padding: 20px;
  margin: 10px 0;
}

.result-wrong {
  background: linear-gradient(135deg, #fff1f2, #ffe4e6);
  border: 2px solid #fca5a5;
  border-radius: 20px;
  padding: 20px;
  margin: 10px 0;
}

/* ── DIVIDER ── */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, #e5e7eb, transparent);
  margin: 12px 0;
}

</style>

</head>

<body>

<div class="splash" id="splash">
  <img src="icon.png" style="width:140px">
  TripTalk
  <div class="splash-sub">Carregando...</div>
</div>

<div class="app" id="app"></div>

<script src="phrases.js"></script>

<script>

setTimeout(()=>{
  document.getElementById("splash").style.display="none"
  document.getElementById("app").style.display="block"
},1500)

let screen="home"
let module=""
let index=0
let quizMode=false

let name=localStorage.name||""
let points=Number(localStorage.points)||0

function render(){

const app=document.getElementById("app")

if(screen=="home"){

app.innerHTML=`

<img src="icon.png" class="logo">

<h1>TripTalk</h1>

<p>O inglês que pode salvar sua primeira viagem ✈️</p>

<div class="divider"></div>

<button class="green" onclick="screen='name';render()">
COMEÇAR
</button>

<button class="orange" onclick="reset()">
Reiniciar progresso
</button>

`

}

if(screen=="name"){

app.innerHTML=`

<h2>Como você se chama?</h2>
<p>Vamos personalizar sua experiência</p>

<input id="nameInput" placeholder="Seu nome" style="padding:13px 16px;width:90%;border:2px solid #e5e7eb;border-radius:12px;font-size:16px;font-family:'Nunito',system-ui,sans-serif;font-weight:700;color:#1e1b4b;outline:none;display:block;margin:12px auto 0;">

<button class="green" onclick="saveName()">
Continuar →
</button>

`

}

if(screen=="modules"){

app.innerHTML=`

<img src="icon.png" style="width:70px;margin-bottom:6px;filter:drop-shadow(0 4px 12px rgba(99,102,241,0.3))">

<h2>${name}</h2>

<div class="points-badge">⭐ ${points} pontos</div>

<div class="grid">

<div class="card airport" onclick="start('airport')">✈️ Airport</div>
<div class="card hotel" onclick="start('hotel')">🏨 Hotel</div>
<div class="card restaurant" onclick="start('restaurant')">🍔 Restaurant</div>
<div class="card transport" onclick="start('transport')">🚕 Transport</div>
<div class="card shopping" onclick="start('shopping')">🛍️ Shopping</div>
<div class="card tourism" onclick="start('tourism')">🗺️ Tourism</div>
<div class="card conversation" onclick="start('conversation')">💬 Conversation</div>
<div class="card emergency" onclick="start('emergency')">🚑 Emergency</div>

</div>

<div class="divider" style="margin-top:16px"></div>

<button class="blue" onclick="screen='help';render()">
Ajuda / Suporte
</button>

<button class="orange" onclick="screen='home';render()">
Menu
</button>

`

}

if(screen=="help"){

app.innerHTML=`

<h2>Suporte</h2>

<p>Dúvidas ou problemas:</p>

<h3>triptalkenglish@gmail.com</h3>

<button class="purple" onclick="screen='modules';render()">
← Voltar
</button>

`

}

if(screen=="lesson"){

let list=phrases.filter(p=>p.m==module)
let p=list[index] || list[0]

if(!p){

screen="modules"
render()
return

}

let progress=(index/list.length)*100

if(index>0 && index%10==0 && !quizMode){

quizMode=true
renderQuiz(p)
return

}

app.innerHTML=`

<button class="orange" onclick="screen='modules';render()">
← Voltar
</button>

<div class="module-title">${module.toUpperCase()}</div>

<div class="progressBar">
<div class="progressFill" style="width:${progress}%"></div>
</div>

<div class="phrase-box">
<div class="phrase-en">${p.en}</div>
</div>

<button class="blue" onclick="speak('${p.en}')">
🔊 Ouvir
</button>

<div class="pron-box">
<div class="pron-label">Pronúncia</div>
<div class="pron-text">${p.pron}</div>
</div>

<p class="pt-text">${p.pt}</p>

<button class="purple" onclick="next()">
Continuar →
</button>

`

}

}

function renderQuiz(p){

const app=document.getElementById("app")

let correct=p.pt

let list=phrases
.filter(x=>x.m==module)
.map(x=>x.pt)
.filter(x=>x!=correct)

let wrong1=list[Math.floor(Math.random()*list.length)]
let wrong2=list[Math.floor(Math.random()*list.length)]

let options=[correct,wrong1,wrong2].sort(()=>Math.random()-0.5)

app.innerHTML=`

<div class="module-title">QUIZ</div>

<h2 style="margin-top:8px">${p.en}</h2>

<p style="color:#9ca3af;font-size:13px">O que significa essa frase?</p>

${options.map(o=>`

<div class="quizOption" onclick="answer('${o}','${correct}')">
${o}
</div>

`).join("")}

`

}

function answer(choice,correct){

const app=document.getElementById("app")

if(choice==correct){

points+=10
localStorage.points=points

confetti({
particleCount:120,
spread:70,
origin:{y:0.6}
})

app.innerHTML=`

<div class="result-correct">
<div style="font-size:48px">🎉</div>
<h1 style="color:#16a34a;margin:4px 0">Correto!</h1>
<div class="points-badge" style="margin:8px auto">+10 pontos ⭐</div>
</div>

<button class="blue" onclick="continueLesson()">
Continuar →
</button>

`

}else{

app.innerHTML=`

<div class="result-wrong">
<div style="font-size:48px">😬</div>
<h1 style="color:#dc2626;margin:4px 0">Errado</h1>
<p style="color:#991b1b;font-weight:700">Resposta correta:</p>
<h3 style="color:#1e1b4b">${correct}</h3>
</div>

<button class="blue" onclick="continueLesson()">
Continuar →
</button>

`

}

}

function continueLesson(){

quizMode=false
index++
render()

}

function speak(text){

let msg=new SpeechSynthesisUtterance(text)
msg.lang="en-US"
speechSynthesis.speak(msg)

}

function saveName(){

name=document.getElementById("nameInput").value
localStorage.name=name

screen="modules"
render()

}

function start(m){

module=m
index=0
quizMode=false

screen="lesson"
render()

}

function next(){

index++
render()

}

function reset(){

localStorage.clear()

points=0
name=""

screen="home"
render()

}

render()

</script>

</body>

</html>
