<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripTalk</title>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:linear-gradient(135deg,#2563eb,#7c3aed);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.app{
width:380px;
max-width:95vw;
background:#020617;
border-radius:26px;
padding:20px;
box-shadow:0 30px 80px rgba(0,0,0,.7);
}

.header{
font-size:28px;
font-weight:700;
text-align:center;
margin-bottom:5px;
}

.sub{
text-align:center;
opacity:.7;
margin-bottom:15px;
}

.stats{
text-align:center;
margin-bottom:15px;
}

.progress{
height:10px;
background:#1e293b;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.bar{
height:100%;
background:#22c55e;
width:0%;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.primary{background:#3b82f6;color:white}
.module{background:#1e293b;color:white}
.locked{background:#334155;color:#94a3b8}
.quiz{background:#334155;color:white}
.back{background:#f97316;color:white}
.audio{background:#2563eb;color:white}
.speak{background:#16a34a;color:white}

.card{
background:#1e293b;
padding:18px;
border-radius:14px;
margin-bottom:10px;
font-size:18px;
line-height:1.5;
}

.correct{background:#22c55e!important}
.wrong{background:#ef4444!important}

</style>

</head>

<body>

<div class="app">

<div class="header">✈️ TripTalk</div>
<div class="sub">Inglês para sua primeira viagem</div>

<div class="stats">
⭐ Pontos: <span id="points">0</span> | 🔥 Streak: <span id="streak">0</span>
</div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div id="screen">

<button class="primary" onclick="modules()">Começar</button>

</div>

</div>

<script>

let points=0
let progress=0
let streak=0
let unlocked=1

function update(){
document.getElementById("points").innerText=points
document.getElementById("streak").innerText=streak
document.getElementById("bar").style.width=progress+"%"
}

function speak(text){
let speech=new SpeechSynthesisUtterance(text)
speech.lang="en-US"
speech.rate=0.85
speechSynthesis.speak(speech)
}

function listen(){
let recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)()
recognition.lang="en-US"
recognition.start()
recognition.onresult=function(event){
alert("Você disse: "+event.results[0][0].transcript)
}
}

function modules(){

document.getElementById("screen").innerHTML=`

<button class="${unlocked>=1?'module':'locked'}" onclick="${unlocked>=1?'airport()':''}">✈️ Aeroporto</button>
<button class="${unlocked>=2?'module':'locked'}" onclick="${unlocked>=2?'hotel()':''}">🏨 Hotel</button>
<button class="${unlocked>=3?'module':'locked'}" onclick="${unlocked>=3?'restaurant()':''}">🍔 Restaurante</button>
<button class="${unlocked>=4?'module':'locked'}" onclick="${unlocked>=4?'transport()':''}">🚕 Transporte</button>

<button class="back" onclick="home()">⬅ Voltar</button>

`

}

function home(){
document.getElementById("screen").innerHTML=`<button class="primary" onclick="modules()">Começar</button>`
}

function airport(){

document.getElementById("screen").innerHTML=`

<div class="card">Where is the airport?<br><br>Onde fica o aeroporto?</div>
<button class="audio" onclick="speak('Where is the airport')">🔊 Ouvir</button>
<button class="speak" onclick="listen()">🎤 Falar</button>

<div class="card">Where is my gate?<br><br>Onde é meu portão?</div>
<button class="audio" onclick="speak('Where is my gate')">🔊 Ouvir</button>
<button class="speak" onclick="listen()">🎤 Falar</button>

<button class="quiz" onclick="quiz()">🧠 Quiz</button>
<button class="back" onclick="modules()">⬅ Voltar</button>

`

}

function hotel(){

document.getElementById("screen").innerHTML=`

<div class="card">I have a reservation<br><br>Eu tenho uma reserva</div>
<button class="audio" onclick="speak('I have a reservation')">🔊 Ouvir</button>
<button class="speak" onclick="listen()">🎤 Falar</button>

<div class="card">What time is check-in?<br><br>Que horas é o check-in?</div>
<button class="audio" onclick="speak('What time is check in')">🔊 Ouvir</button>
<button class="speak" onclick="listen()">🎤 Falar</button>

<button class="back" onclick="modules()">⬅ Voltar</button>

`

}

function restaurant(){

document.getElementById("screen").innerHTML=`

<div class="card">Can I see the menu?<br><br>Posso ver o menu?</div>
<button class="audio" onclick="speak('Can I see the menu')">🔊 Ouvir</button>
<button class="speak" onclick="listen()">🎤 Falar</button>

<div class="card">The bill please<br><br>A conta por favor</div>
<button class="audio" onclick="speak('The bill please')">🔊 Ouvir</button>
<button class="speak" onclick="listen()">🎤 Falar</button>

<button class="back" onclick="modules()">⬅ Voltar</button>

`

}

function transport(){

document.getElementById("screen").innerHTML=`

<div class="card">Call a taxi please<br><br>Chame um taxi por favor</div>
<button class="audio" onclick="speak('Call a taxi please')">🔊 Ouvir</button>
<button class="speak" onclick="listen()">🎤 Falar</button>

<div class="card">Where is the subway?<br><br>Onde fica o metrô?</div>
<button class="audio" onclick="speak('Where is the subway')">🔊 Ouvir</button>
<button class="speak" onclick="listen()">🎤 Falar</button>

<button class="back" onclick="modules()">⬅ Voltar</button>

`

}

function quiz(){

document.getElementById("screen").innerHTML=`

<div class="card">Como dizer:<br><br>Onde fica o aeroporto?</div>

<button class="quiz" onclick="answer(this,true)">Where is the airport</button>
<button class="quiz" onclick="answer(this,false)">Where is the hotel</button>
<button class="quiz" onclick="answer(this,false)">Where is the taxi</button>

<button class="back" onclick="modules()">⬅ Voltar</button>

`

}

function answer(btn,correct){

if(correct){

btn.classList.add("correct")
points+=10
progress+=25
streak+=1
unlocked=2

}else{

btn.classList.add("wrong")

}

update()

}

</script>

</body>
</html>
