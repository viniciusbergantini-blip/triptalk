<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripTalk</title>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:linear-gradient(135deg,#1e3a8a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.app{
width:380px;
max-width:95vw;
background:#0f172a;
border-radius:26px;
padding:20px;
box-shadow:0 25px 70px rgba(0,0,0,.6);
}

.header{
font-size:26px;
font-weight:700;
text-align:center;
margin-bottom:5px;
}

.sub{
text-align:center;
opacity:.7;
margin-bottom:15px;
}

.points{
text-align:center;
margin-bottom:15px;
}

.progress{
height:10px;
background:#1e293b;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.bar{
height:100%;
background:#3b82f6;
width:0%;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.primary{background:#3b82f6;color:white}
.module{background:#1e293b;color:white}
.quiz{background:#334155;color:white}
.back{background:#f97316;color:white}

.card{
background:#1e293b;
padding:18px;
border-radius:14px;
margin-bottom:10px;
font-size:18px;
line-height:1.5;
}

.correct{background:#22c55e!important}
.wrong{background:#ef4444!important}

.audio{
margin-top:10px;
background:#2563eb;
}

</style>

</head>

<body>

<div class="app">

<div class="header">✈️ TripTalk</div>
<div class="sub">Inglês para sua primeira viagem</div>

<div class="points">⭐ Pontos: <span id="points">0</span></div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div id="screen">

<button class="primary" onclick="modules()">Começar</button>

</div>

</div>

<script>

let points=0
let progress=0

function update(){
document.getElementById("points").innerText=points
document.getElementById("bar").style.width=progress+"%"
}

function speak(text){

let speech=new SpeechSynthesisUtterance(text)
speech.lang="en-US"
speech.rate=0.85
speech.pitch=1
speech.volume=1

speechSynthesis.speak(speech)

}

function modules(){

document.getElementById("screen").innerHTML=`

<button class="module" onclick="airport()">✈️ Aeroporto</button>
<button class="module" onclick="hotel()">🏨 Hotel</button>
<button class="module" onclick="restaurant()">🍔 Restaurante</button>
<button class="module" onclick="transport()">🚕 Transporte</button>
<button class="module" onclick="quiz()">🧠 Quiz</button>
<button class="back" onclick="home()">⬅ Voltar</button>

`

}

function home(){
document.getElementById("screen").innerHTML=
`<button class="primary" onclick="modules()">Começar</button>`
}

function airport(){

document.getElementById("screen").innerHTML=`

<div class="card">
Where is the airport?<br><br>
Onde fica o aeroporto?
<button class="audio" onclick="speak('Where is the airport')">🔊 Ouvir</button>
</div>

<div class="card">
Where is my gate?<br><br>
Onde é meu portão?
<button class="audio" onclick="speak('Where is my gate')">🔊 Ouvir</button>
</div>

<button class="back" onclick="modules()">⬅ Voltar</button>

`

}

function hotel(){

document.getElementById("screen").innerHTML=`

<div class="card">
I have a reservation<br><br>
Eu tenho uma reserva
<button class="audio" onclick="speak('I have a reservation')">🔊 Ouvir</button>
</div>

<div class="card">
What time is breakfast?<br><br>
Que horas é o café da manhã?
<button class="audio" onclick="speak('What time is breakfast')">🔊 Ouvir</button>
</div>

<button class="back" onclick="modules()">⬅ Voltar</button>

`

}

function restaurant(){

document.getElementById("screen").innerHTML=`

<div class="card">
Can I see the menu?<br><br>
Posso ver o menu?
<button class="audio" onclick="speak('Can I see the menu')">🔊 Ouvir</button>
</div>

<div class="card">
I would like a coffee<br><br>
Eu gostaria de um café
<button class="audio" onclick="speak('I would like a coffee')">🔊 Ouvir</button>
</div>

<button class="back" onclick="modules()">⬅ Voltar</button>

`

}

function transport(){

document.getElementById("screen").innerHTML=`

<div class="card">
Where is the subway station?<br><br>
Onde fica o metrô?
<button class="audio" onclick="speak('Where is the subway station')">🔊 Ouvir</button>
</div>

<div class="card">
How much is the taxi?<br><br>
Quanto custa o taxi?
<button class="audio" onclick="speak('How much is the taxi')">🔊 Ouvir</button>
</div>

<button class="back" onclick="modules()">⬅ Voltar</button>

`

}

function quiz(){

document.getElementById("screen").innerHTML=`

<div class="card">

Como dizer:<br><br>
Onde fica o aeroporto?

</div>

<button class="quiz" onclick="answer(this,true)">Where is the airport</button>
<button class="quiz" onclick="answer(this,false)">Where is the hotel</button>
<button class="quiz" onclick="answer(this,false)">Where is the taxi</button>

<button class="back" onclick="modules()">⬅ Voltar</button>

`

}

function answer(btn,correct){

if(correct){

btn.classList.add("correct")
points+=10
progress+=20

}else{

btn.classList.add("wrong")

}

update()

}

</script>

</body>
</html>
