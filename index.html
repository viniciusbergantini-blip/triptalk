<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TripTalk English</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg1:#2563eb; --bg2:#7c3aed; --bg3:#ec4899;
  --card:#ffffff; --text:#0f172a; --muted:#64748b;
  --btn:#3b82f6; --ok:#22c55e; --warn:#f97316;
}
@media (prefers-color-scheme: dark){
  :root{ --card:#020617; --text:#ffffff; --muted:#94a3b8; }
}
*{box-sizing:border-box}
body{
  margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  color:var(--text);
}
.app{
  width:420px; max-width:94vw; background:var(--card); border-radius:26px;
  padding:20px; box-shadow:0 30px 80px rgba(0,0,0,.35);
}
.center{text-align:center}
.logo{font-size:40px}
.title{font-size:24px; font-weight:800}
.subtitle{color:var(--muted); margin-bottom:12px}
.stats{font-size:14px; margin-bottom:10px}
.progress{height:10px; background:#e5e7eb; border-radius:999px; overflow:hidden; margin:10px 0 16px}
.bar{height:100%; background:var(--ok); width:0%}
.grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.card{
  background:#f1f5f9; border-radius:16px; padding:16px; text-align:left; cursor:pointer;
}
.btn{
  width:100%; border:0; border-radius:14px; padding:14px; font-weight:700; cursor:pointer;
}
.btn-primary{background:var(--btn); color:#fff}
.btn-audio{background:#2563eb; color:#fff}
.btn-speak{background:#16a34a; color:#fff}
.btn-quiz{background:#334155; color:#fff}
.btn-back{background:var(--warn); color:#fff}
.lesson{background:#f1f5f9; border-radius:16px; padding:18px; margin-bottom:10px}
.pron{color:var(--muted)}
.row{display:flex; gap:8px; margin-top:10px}
.row .btn{flex:1}
.confetti{
  position:fixed; inset:0; pointer-events:none; display:flex; align-items:center; justify-content:center;
  font-size:42px; animation:pop .9s ease-out forwards;
}
@keyframes pop{0%{transform:scale(.6);opacity:0}40%{opacity:1}100%{transform:scale(1.2);opacity:0}}
.progressCircle{
  width:60px;height:60px;border-radius:50%;
  background:conic-gradient(var(--ok) calc(var(--p)*1%), #e5e7eb 0);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
}
</style>
</head>
<body>

<div class="app">
  <div id="screen"></div>
</div>

<audio id="ding" preload="auto"
src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7a2f3dff9a.mp3?filename=correct-2-46134.mp3"></audio>

<script>
// registrar PWA
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }

// dados
let data = JSON.parse(localStorage.getItem("triptalk_en")) || {
  name:"", points:0, streak:0, progress:0, lesson:0, module:"airport"
};
function save(){ localStorage.setItem("triptalk_en", JSON.stringify(data)); }

// módulos
const modules = [
  {key:"airport", name:"✈️ Airport"},
  {key:"hotel", name:"🏨 Hotel"},
  {key:"restaurant", name:"🍔 Restaurant"},
  {key:"transport", name:"🚕 Transportation"},
  {key:"shopping", name:"🛍️ Shopping"},
  {key:"tourism", name:"🗺️ Tourism"},
  {key:"conversation", name:"💬 Conversation"},
  {key:"emergency", name:"🚑 Emergency"},
];

// frases exemplo
const lessons = [
  {m:"airport", en:"Where is the airport?", pron:"Uér iz dhi érport", pt:"Onde fica o aeroporto?"},
  {m:"airport", en:"Where is my gate?", pron:"Uér iz mai gueit", pt:"Onde é meu portão?"},
  {m:"airport", en:"Where is immigration?", pron:"Uér iz imigreixon", pt:"Onde fica a imigração?"},
  {m:"airport", en:"Where is baggage claim?", pron:"Uér iz béguêj kleim", pt:"Onde retiro a bagagem?"}
];

// splash
function splash(){
  screen.innerHTML=`
  <div class="center">
  <div class="logo">🌎</div>
  <div class="title">TripTalk English</div>
  <div class="subtitle">English for Travel Certification</div>
  <p>Loading...</p>
  </div>`;
  setTimeout(()=>{ data.name?home():askName(); },1200);
}

// pedir nome
function askName(){
  screen.innerHTML=`
  <div class="center">
  <div class="logo">🌎</div>
  <div class="title">TripTalk English</div>
  <p>Digite seu nome para começar</p>
  <input id="nameInput" placeholder="Seu nome" style="padding:10px;border-radius:8px;border:1px solid #ccc;width:80%">
  <br><br>
  <button class="btn btn-primary" onclick="saveName()">COMEÇAR</button>
  </div>`;
}
function saveName(){
  data.name=document.getElementById("nameInput").value||"Student";
  save();
  home();
}

// home
function home(){
  screen.innerHTML=`
  <div class="center">
  <div class="logo">🌎</div>
  <div class="title">TripTalk English</div>
  <div class="subtitle">Não passe sufoco na sua primeira viagem ✈️</div>
  <div class="stats">⭐ ${data.points} 🔥 ${data.streak}</div>
  <button class="btn btn-primary" onclick="menu()">COMEÇAR A TREINAR</button>
  <div class="row">
    <button class="btn btn-quiz" onclick="practice()">PRATICAR AGORA</button>
    <button class="btn btn-back" onclick="reset()">Reset</button>
  </div>
  </div>`;
}

// menu módulos
function menu(){
  let cards="";
  modules.forEach(m=>{
    cards+=`
    <div class="card" onclick="startModule('${m.key}')">
    <div>${m.name}</div>
    <div class="progressCircle" style="--p:${data.progress}">${data.progress}%</div>
    </div>`;
  });
  screen.innerHTML=`
  <div class="title">Escolha um módulo</div>
  <div class="grid">${cards}</div>
  <div class="row">
  <button class="btn btn-back" onclick="home()">← Menu</button>
  </div>`;
}

function startModule(key){
  data.module=key;
  data.lesson=lessons.findIndex(l=>l.m===key);
  lesson();
}

// lição
function lesson(){
  let l=lessons[data.lesson];
  screen.innerHTML=`
  <div class="lesson">
  <b>${l.en}</b><br>
  <div class="pron">${l.pron}</div>
  <div>${l.pt}</div>
  </div>
  <div class="row">
  <button class="btn btn-audio" onclick="speak('${l.en}')">🔊 Ouvir</button>
  <button class="btn btn-speak" onclick="listen()">🎤 Falar</button>
  </div>
  <button class="btn btn-quiz" onclick="quiz()">Continuar</button>
  <div class="row">
  <button class="btn btn-back" onclick="menu()">← Menu</button>
  </div>`;
}

function speak(text){
  let u=new SpeechSynthesisUtterance(text);
  u.lang="en-US"; speechSynthesis.speak(u);
}

function listen(){
  try{
  let r=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
  r.lang="en-US"; r.start();
  r.onresult=e=>alert("Você disse: "+e.results[0][0].transcript);
  }catch{alert("Seu navegador não suporta microfone");}
}

// quiz
function quiz(){
  let l=lessons[data.lesson];
  screen.innerHTML=`
  <div class="lesson center">
  Como dizer:<br><b>${l.pt}</b>
  </div>
  <button class="btn btn-quiz" onclick="answer(true)">${l.en}</button>
  <button class="btn btn-quiz" onclick="answer(false)">Where is the hotel?</button>
  <button class="btn btn-quiz" onclick="answer(false)">Where is the taxi?</button>`;
}

function answer(correct){
  if(correct){
    ding.play();
    let c=document.createElement("div");
    c.className="confetti"; c.textContent="🎉";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),900);
    data.points+=10;
    data.progress+=10;
    data.lesson++;
    save();
    setTimeout(()=>lesson(),500);
  }else alert("Tente novamente");
}

// modo prática
function practice(){
  data.lesson=Math.floor(Math.random()*lessons.length);
  lesson();
}

// reset
function reset(){
  if(confirm("Resetar progresso?")){
    localStorage.removeItem("triptalk_en");
    location.reload();
  }
}

// certificado
function certificate(){
  let html=`
  <h1>Certificate of Completion</h1>
  <h2>TripTalk English</h2>
  <p>English for Travel Certification</p>
  <p>This certifies that</p>
  <h3>${data.name}</h3>
  <p>has completed the course</p>
  <p>Total workload: 10 hours</p>`;
  let w=window.open("");
  w.document.write(html);
}

let screen=document.getElementById("screen");
splash();
</script>

</body>
</html>
