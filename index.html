<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TripTalk</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.box{
background:#1e293b;
padding:40px;
border-radius:14px;
max-width:400px;
}

input{
padding:12px;
width:100%;
margin-top:15px;
border-radius:8px;
border:none;
}

button{
margin-top:15px;
padding:12px;
width:100%;
border:none;
border-radius:8px;
background:#22c55e;
color:white;
font-size:16px;
}

.buy{
background:#3b82f6;
}

</style>

</head>

<body>

<div class="box">

<h2>🔒 Desbloquear TripTalk</h2>

<p>
Para acessar o aplicativo é necessário desbloquear.
</p>

<button class="buy" onclick="comprar()">
Comprar acesso
</button>

<input id="codigo" placeholder="Digite seu código">

<button onclick="entrar()">
Desbloquear
</button>

</div>

<script>

function comprar(){
window.open("https://pay.kiwify.com.br/pPCzEYj");
}

function entrar(){

let codigo=document.getElementById("codigo").value;

if(codigo==="TRIP2026"){
localStorage.setItem("triptalk","liberado");
window.location.href="app.html";
}
else{
alert("Código inválido");
}

}

if(localStorage.getItem("triptalk")==="liberado"){
window.location.href="app.html";
}

</script>

</body>

</html>
