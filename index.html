<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripTalk</title>

<link rel="manifest" href="manifest.json">

<style>
body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:linear-gradient(135deg,#2563eb,#7c3aed);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.app{
width:380px;
max-width:95vw;
background:#020617;
border-radius:26px;
padding:20px;
box-shadow:0 30px 80px rgba(0,0,0,.7);
}

.header{
font-size:26px;
font-weight:700;
text-align:center;
}

.stats{
text-align:center;
margin:10px 0;
}

.progress{
height:10px;
background:#1e293b;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.bar{
height:100%;
background:#22c55e;
width:0%;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:14px;
font-size:16px;
cursor:pointer;
}

.primary{background:#3b82f6;color:white}
.quiz{background:#334155;color:white}
.audio{background:#2563eb;color:white}
.speak{background:#16a34a;color:white}

.card{
background:#1e293b;
padding:18px;
border-radius:14px;
margin-bottom:10px;
font-size:18px;
}

.correct{background:#22c55e!important}
.wrong{background:#ef4444!important}
</style>

</head>

<body>

<div class="app">

<div class="header">✈️ TripTalk</div>

<div class="stats">
⭐ Pontos: <span id="points">0</span> | 🔥 Streak: <span id="streak">0</span>
</div>

<div class="progress">
<div id="bar" class="bar"></div>
</div>

<div id="screen"></div>

</div>

<script>

if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js')
}

let data = JSON.parse(localStorage.getItem("triptalk")) || {
points:0,
streak:0,
progress:0,
lesson:0
}

const lessons = [

{en:"Where is the airport?",pt:"Onde fica o aeroporto?"},
{en:"Where is my gate?",pt:"Onde é meu portão?"},
{en:"I have a reservation",pt:"Eu tenho uma reserva"},
{en:"What time is check-in?",pt:"Que horas é o check-in?"},
{en:"Can I see the menu?",pt:"Posso ver o menu?"},
{en:"The bill please",pt:"A conta por favor"},
{en:"Call a taxi please",pt:"Chame um taxi por favor"},
{en:"Where is the subway?",pt:"Onde fica o metrô?"}

]

function save(){
localStorage.setItem("triptalk",JSON.stringify(data))
}

function update(){
document.getElementById("points").innerText=data.points
document.getElementById("streak").innerText=data.streak
document.getElementById("bar").style.width=data.progress+"%"
}

function speak(text){
let speech=new SpeechSynthesisUtterance(text)
speech.lang="en-US"
speech.rate=0.85
speechSynthesis.speak(speech)
}

function listen(){
let recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)()
recognition.lang="en-US"
recognition.start()
recognition.onresult=function(event){
alert("Você disse: "+event.results[0][0].transcript)
}
}

function lesson(){

let l=lessons[data.lesson]

document.getElementById("screen").innerHTML=`

<div class="card">
${l.en}<br><br>${l.pt}
</div>

<button class="audio" onclick="speak('${l.en}')">🔊 Ouvir</button>
<button class="speak" onclick="listen()">🎤 Falar</button>

<button class="quiz" onclick="quiz()">Continuar</button>

`

update()

}

function quiz(){

let l=lessons[data.lesson]

document.getElementById("screen").innerHTML=`

<div class="card">

Como dizer:<br><br>${l.pt}

</div>

<button class="quiz" onclick="answer(true)"> ${l.en}</button>
<button class="quiz" onclick="answer(false)"> Wrong option</button>
<button class="quiz" onclick="answer(false)"> Another wrong</button>

`

}

function answer(correct){

if(correct){
data.points+=10
data.progress+=10
data.streak+=1
data.lesson++
save()

if(data.lesson>=lessons.length){
document.getElementById("screen").innerHTML="<div class='card'>🎉 Curso concluído!</div>"
return
}

lesson()

}else{

alert("Tente novamente")

}

update()

}

lesson()

</script>

</body>
</html>
