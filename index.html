<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TripTalk</title>

<style>

body{
margin:0;
font-family:system-ui;
background:linear-gradient(135deg,#4f46e5,#9333ea);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.app{
width:430px;
max-width:95%;
background:white;
border-radius:20px;
padding:25px;
box-shadow:0 20px 40px rgba(0,0,0,.2);
text-align:center;
}

h1{margin:10px 0}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.card{
background:#eef2ff;
padding:16px;
border-radius:12px;
cursor:pointer;
font-weight:600;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

.blue{background:#2563eb;color:white}
.green{background:#16a34a;color:white}
.purple{background:#4f46e5;color:white}
.orange{background:#fb923c;color:white}

.progress{
height:8px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin:15px 0;
}

.bar{
height:8px;
background:#22c55e;
}

</style>

</head>

<body>

<div class="app" id="app"></div>

<script src="phrases.js"></script>

<script>

let screen="home"
let module=""
let index=0

let points=localStorage.points||0
let streak=localStorage.streak||0

function render(){

const app=document.getElementById("app")

if(screen==="home"){

app.innerHTML=`

<h1>🌍 TripTalk</h1>

<p>
O inglês que pode salvar sua primeira viagem
</p>

<button class="purple" onclick="screen='modules';render()">
COMEÇAR
</button>

<button class="orange" onclick="reset()">
Resetar progresso
</button>

`

}

if(screen==="modules"){

app.innerHTML=`

<h3>⭐ ${points} | 🔥 ${streak}</h3>

<div class="grid">

<div class="card" onclick="start('airport')">✈ Airport</div>
<div class="card" onclick="start('hotel')">🏨 Hotel</div>
<div class="card" onclick="start('restaurant')">🍔 Restaurant</div>
<div class="card" onclick="start('transport')">🚕 Transportation</div>
<div class="card" onclick="start('shopping')">🛍 Shopping</div>
<div class="card" onclick="start('tourism')">🗺 Tourism</div>
<div class="card" onclick="start('conversation')">💬 Conversation</div>
<div class="card" onclick="start('emergency')">🚑 Emergency</div>

</div>

<button class="orange" onclick="screen='home';render()">
← Voltar
</button>

`

}

if(screen==="lesson"){

let list=phrases.filter(p=>p.m===module)
let p=list[index]

if(!p){
screen="modules"
index=0
render()
return
}

let pct=Math.floor((index/list.length)*100)

app.innerHTML=`

<h3>⭐ ${points} | 🔥 ${streak}</h3>

<div class="progress">
<div class="bar" style="width:${pct}%"></div>
</div>

<h2>${p.en}</h2>

<button class="blue" onclick="speak('${p.en}')">
🔊 Ouvir
</button>

<p>
<b>Pronúncia</b><br>
${p.pron}
</p>

<p>${p.pt}</p>

<button class="green" onclick="speak('${p.en}')">
🎤 Falar
</button>

<button class="purple" onclick="next()">
Continuar
</button>

<button class="orange" onclick="screen='modules';render()">
← Menu
</button>

`

}

}

function start(m){

module=m
index=0
screen="lesson"
render()

}

function next(){

index++
points++

localStorage.points=points

render()

}

function speak(t){

let msg=new SpeechSynthesisUtterance(t)
msg.lang="en-US"
speechSynthesis.speak(msg)

}

function reset(){

localStorage.clear()

points=0
streak=0

alert("Progresso resetado")

}

render()

</script>

</body>
</html>
