<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripTalk</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{

width:360px;
background:#111827;
border-radius:20px;
padding:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
color:white;

}

.header{

background:#22c55e;
padding:14px;
border-radius:12px;
text-align:center;
font-size:22px;
font-weight:bold;
margin-bottom:20px;

}

.subtitle{

text-align:center;
opacity:0.8;
margin-bottom:20px;

}

button{

width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.2s;

}

button:hover{

transform:scale(1.03);

}

.primary{

background:#3b82f6;
color:white;

}

.module{

background:#374151;
color:white;

}

.back{

background:#f97316;
color:white;

}

.card{

background:#1f2937;
padding:18px;
border-radius:12px;
margin-bottom:10px;
line-height:1.5;

}

</style>

</head>

<body>

<div class="app">

<div class="header">✈️ TripTalk</div>

<div id="screen">

<div class="subtitle">

Aprenda inglês para sua primeira viagem

</div>

<button class="primary" onclick="modules()">Começar</button>

</div>

</div>

<script>

function modules(){

document.getElementById("screen").innerHTML=`

<div class="subtitle">Escolha um módulo</div>

<button class="module" onclick="airport()">✈️ Aeroporto</button>

<button class="module" onclick="hotel()">🏨 Hotel</button>

<button class="module" onclick="restaurant()">🍔 Restaurante</button>

<button class="module" onclick="transport()">🚕 Transporte</button>

<button class="back" onclick="home()">⬅ Voltar</button>

`

}

function home(){

document.getElementById("screen").innerHTML=`

<div class="subtitle">Aprenda inglês para sua primeira viagem</div>

<button class="primary" onclick="modules()">Começar</button>

`

}

function airport(){

document.getElementById("screen").innerHTML=`

<div class="card">

Where is the airport?<br><br>

Onde fica o aeroporto?

</div>

<button class="back" onclick="modules()">⬅ Voltar</button>

`

}

function hotel(){

document.getElementById("screen").innerHTML=`

<div class="card">

I have a reservation<br><br>

Eu tenho uma reserva

</div>

<button class="back" onclick="modules()">⬅ Voltar</button>

`

}

function restaurant(){

document.getElementById("screen").innerHTML=`

<div class="card">

Can I see the menu?<br><br>

Posso ver o menu?

</div>

<button class="back" onclick="modules()">⬅ Voltar</button>

`

}

function transport(){

document.getElementById("screen").innerHTML=`

<div class="card">

Where is the subway station?<br><br>

Onde fica o metrô?

</div>

<button class="back" onclick="modules()">⬅ Voltar</button>

`

}

</script>

</body>
</html>
