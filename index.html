<!DOCTYPE html>

<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TripTalk</title>

<style>

body{
margin:0;
font-family:system-ui;
background:linear-gradient(135deg,#3b82f6,#6366f1);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.app{
width:420px;
max-width:95%;
background:white;
border-radius:22px;
padding:25px;
box-shadow:0 20px 50px rgba(0,0,0,.25);
text-align:center;
}

h1{margin:10px 0}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.card{
padding:18px;
border-radius:14px;
color:white;
font-weight:600;
cursor:pointer;
}

.airport{background:#3b82f6}
.hotel{background:#ef4444}
.restaurant{background:#22c55e}
.transport{background:#6366f1}
.shopping{background:#ec4899}
.tourism{background:#0ea5e9}
.conversation{background:#a855f7}
.emergency{background:#f97316}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
font-size:16px;
cursor:pointer;
color:white;
}

.green{background:#22c55e}
.blue{background:#3b82f6}
.orange{background:#fb923c}
.purple{background:#6366f1}

.progressDots{
display:flex;
justify-content:center;
gap:6px;
margin:10px 0;
}

.dot{
width:10px;
height:10px;
border-radius:10px;
background:#ddd;
}

.dot.active{
background:#22c55e;
}

.quizOption{
background:#eee;
padding:12px;
border-radius:10px;
margin-top:8px;
cursor:pointer;
}

.correct{
background:#22c55e;
color:white;
}

</style>

</head>

<body>

<div class="app" id="app"></div>

<script src="phrases.js"></script>

<script>

let screen="home"
let module=""
let index=0
let quizMode=false

let name=localStorage.name||""
let points=Number(localStorage.points)||0

function render(){

const app=document.getElementById("app")

if(screen=="home"){

app.innerHTML=`

<h1>🌍 TripTalk</h1>

<p>O inglês que pode salvar sua primeira viagem ✈</p>

<button class="green" onclick="screen='name';render()">
COMEÇAR A TREINAR
</button>

<button class="orange" onclick="reset()">
Reiniciar progresso
</button>

`

}

if(screen=="name"){

app.innerHTML=`

<h2>Digite seu nome</h2>

<input id="nameInput" style="padding:10px;width:90%">

<button class="green" onclick="saveName()">
Continuar
</button>

`

}

if(screen=="modules"){

app.innerHTML=`

<h3>👤 ${name}</h3>
⭐ ${points} pontos

<div class="grid">

<div class="card airport" onclick="start('airport')">✈ Airport</div>
<div class="card hotel" onclick="start('hotel')">🏨 Hotel</div>
<div class="card restaurant" onclick="start('restaurant')">🍔 Restaurant</div>
<div class="card transport" onclick="start('transport')">🚕 Transport</div>
<div class="card shopping" onclick="start('shopping')">🛍 Shopping</div>
<div class="card tourism" onclick="start('tourism')">🗺 Tourism</div>
<div class="card conversation" onclick="start('conversation')">💬 Conversation</div>
<div class="card emergency" onclick="start('emergency')">🚑 Emergency</div>

</div>

<button class="orange" onclick="screen='home';render()">Menu</button>

`

}

if(screen=="lesson"){

let list=phrases.filter(p=>p.m==module)

let p=list[index]

if(!p){

screen="certificate"
render()
return
}

let dots=""

for(let i=0;i<10;i++){
dots+=`<div class="dot ${i<=index%10?'active':''}"></div>`
}

if(index>0 && index%3==0 && !quizMode){
quizMode=true
renderQuiz(p)
return
}

app.innerHTML=`

<h3>${module.toUpperCase()}</h3>

<div class="progressDots">
${dots}
</div>

<h2>${p.en}</h2>

<button class="blue" onclick="speak('${p.en}')">
🔊 Ouvir
</button>

<p><b>Pronúncia</b><br>${p.pron}</p>

<p>${p.pt}</p>

<button class="green" onclick="speak('${p.en}')">
🎤 Falar
</button>

<button class="purple" onclick="next()">
Continuar
</button>

<button class="orange" onclick="screen='modules';render()">
← Menu
</button>

`

}

if(screen=="certificate"){

app.innerHTML=`

<h1>🎓 Certificado</h1>

<h2>${name}</h2>

<p>Concluiu o curso</p>

<h2>TripTalk Travel English</h2>

⭐ Pontos obtidos: ${points}

<button class="green" onclick="screen='modules';render()">
Voltar
</button>

`

}

}

function renderQuiz(p){

const app=document.getElementById("app")

let correct=p.pt

let options=[

correct,
"Opção errada 1",
"Opção errada 2"

].sort(()=>Math.random()-0.5)

app.innerHTML=`

<h2>Quiz</h2>

<p>${p.en}</p>

${options.map(o=>`

<div class="quizOption" onclick="answer('${o}','${correct}')">
${o}
</div>

`).join("")}

`

}

function answer(choice,correct){

if(choice==correct){
points+=10
localStorage.points=points
alert("Correct! +10 pontos")
}

quizMode=false
render()

}

function saveName(){

name=document.getElementById("nameInput").value
localStorage.name=name
screen="modules"
render()

}

function start(m){

module=m
index=0
screen="lesson"
render()

}

function next(){

index++
render()

}

function speak(t){

let msg=new SpeechSynthesisUtterance(t)
msg.lang="en-US"
speechSynthesis.speak(msg)

}

function reset(){

localStorage.clear()
points=0
name=""
screen="home"
render()

}

render()

</script>

</body>
</html>
