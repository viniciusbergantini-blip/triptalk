<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TripTalk</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#4f46e5,#9333ea);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.app{
width:420px;
max-width:90%;
background:white;
border-radius:20px;
padding:25px;
box-shadow:0 20px 50px rgba(0,0,0,.2);
text-align:center;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
}

.primary{background:#4f46e5;color:white}
.listen{background:#2563eb;color:white}
.speak{background:#16a34a;color:white}
.menu{background:#fb923c;color:white}

.module{
background:#eef2ff;
padding:18px;
border-radius:12px;
margin-top:10px;
cursor:pointer;
}

.progress{
height:8px;
background:#ddd;
border-radius:10px;
overflow:hidden;
margin:15px 0;
}

.bar{
height:8px;
background:#16a34a;
}

</style>

</head>

<body>

<div class="app" id="app"></div>

<script>

let screen="menu"
let module="airport"
let lessonIndex=0
let points=0
let streak=0

const lessons=[

{m:"airport",en:"Where is the airport?",pron:"uer iz dhi erport",pt:"Onde fica o aeroporto"},
{m:"airport",en:"Where is my gate?",pron:"uer iz mai gueit",pt:"Onde é meu portão"},
{m:"airport",en:"Where is immigration?",pron:"uer iz imigreixon",pt:"Onde fica a imigração"},
{m:"airport",en:"Where is baggage claim?",pron:"uer iz baguej cleim",pt:"Onde retiro a bagagem"},
{m:"airport",en:"Where is security?",pron:"uer iz sicuriti",pt:"Onde é a segurança"},
{m:"airport",en:"Where is the restroom?",pron:"uer iz dhi restrum",pt:"Onde fica o banheiro"},
{m:"airport",en:"My flight is delayed",pron:"mai flait iz dileid",pt:"Meu voo está atrasado"},
{m:"airport",en:"My flight was canceled",pron:"mai flait was cênseld",pt:"Meu voo foi cancelado"},
{m:"airport",en:"I lost my luggage",pron:"ai lost mai laguedj",pt:"Perdi minha bagagem"},
{m:"airport",en:"I need help",pron:"ai nid help",pt:"Preciso de ajuda"},
{m:"airport",en:"Where is check in?",pron:"uer iz tchekin",pt:"Onde é o check in"},
{m:"airport",en:"Where is boarding?",pron:"uer iz bording",pt:"Onde é o embarque"},
{m:"airport",en:"Here is my passport",pron:"rir iz mai passport",pt:"Aqui está meu passaporte"},
{m:"airport",en:"Can I see your passport?",pron:"ken ai si yor passport",pt:"Posso ver seu passaporte"},
{m:"airport",en:"I have a connection",pron:"ai rev a conection",pt:"Tenho conexão"},
{m:"airport",en:"Where is the exit?",pron:"uer iz dhi exit",pt:"Onde é a saída"},
{m:"airport",en:"Where can I get a taxi?",pron:"uer ken ai get a taxi",pt:"Onde pegar um taxi"},
{m:"airport",en:"Where is the subway?",pron:"uer iz dhi sabuei",pt:"Onde fica o metrô"},
{m:"airport",en:"How long is the wait?",pron:"rau long iz dhi ueiti",pt:"Quanto tempo de espera"},
{m:"airport",en:"Thank you for your help",pron:"thank iu for yor help",pt:"Obrigado pela ajuda"}

]

function render(){

const app=document.getElementById("app")

if(screen==="menu"){

app.innerHTML=`

<h2>🌍 TripTalk</h2>
<p>O inglês que pode salvar sua primeira viagem</p>

<div class="module" onclick="start('airport')">✈ Airport</div>
<div class="module">🏨 Hotel</div>
<div class="module">🍔 Restaurant</div>
<div class="module">🚕 Transportation</div>

`

}

if(screen==="lesson"){

let list=lessons.filter(l=>l.m===module)
let l=list[lessonIndex]

if(!l){
lessonIndex=0
screen="menu"
render()
return
}

app.innerHTML=`

<h3>⭐ ${points} | 🔥 ${streak}</h3>

<div class="progress">
<div class="bar" style="width:${lessonIndex/list.length*100}%"></div>
</div>

<h2>🇺🇸 ${l.en}</h2>

<button class="listen" onclick="speak('${l.en}')">🔊 Ouvir</button>

<p><b>Pronúncia</b><br>${l.pron}</p>

<p>🇧🇷 ${l.pt}</p>

<button class="speak" onclick="speak('${l.en}')">🎤 Falar</button>

<button class="primary" onclick="next()">Continuar</button>

<button class="menu" onclick="menu()">← Menu</button>

`

}

}

function start(m){
module=m
lessonIndex=0
screen="lesson"
render()
}

function next(){
lessonIndex++
points+=10
streak++
render()
}

function menu(){
screen="menu"
render()
}

function speak(text){
let msg=new SpeechSynthesisUtterance(text)
msg.lang="en-US"
speechSynthesis.speak(msg)
}

render()

</script>

</body>
</html>
