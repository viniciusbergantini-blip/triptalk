<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TripTalk English</title>
<link rel="manifest" href="manifest.json">
<style>
:root{
  --bg1:#2563eb; --bg2:#7c3aed; --bg3:#ec4899;
  --card:#ffffff; --text:#0f172a; --muted:#64748b;
  --btn:#3b82f6; --ok:#22c55e; --warn:#f97316;
}
@media (prefers-color-scheme: dark){
  :root{ --card:#020617; --text:#ffffff; --muted:#94a3b8; }
}
*{box-sizing:border-box}
body{
  margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial;
  background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  color:var(--text);
}
.app{
  width:420px; max-width:94vw; background:var(--card); border-radius:26px;
  padding:20px; box-shadow:0 30px 80px rgba(0,0,0,.35);
}
.top{
  display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;
}
.logo{font-size:36px}
.title{font-size:24px; font-weight:800}
.subtitle{color:var(--muted); margin-bottom:12px}
.stats{font-size:14px; margin-bottom:10px}
.progress{height:10px; background:#e5e7eb; border-radius:999px; overflow:hidden; margin:10px 0 16px}
.bar{height:100%; background:var(--ok); width:0%}
.grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.card{
  background:#f1f5f9; border-radius:16px; padding:16px; text-align:left; cursor:pointer;
}
.card b{display:block; margin-bottom:4px}
.big{font-size:18px}
.center{text-align:center}
.btn{
  width:100%; border:0; border-radius:14px; padding:14px; font-weight:700; cursor:pointer;
}
.btn-primary{background:var(--btn); color:#fff}
.btn-audio{background:#2563eb; color:#fff}
.btn-speak{background:#16a34a; color:#fff}
.btn-quiz{background:#334155; color:#fff}
.btn-back{background:var(--warn); color:#fff}
.row{display:flex; gap:8px; margin-top:10px}
.row .btn{flex:1}
.lesson{background:#f1f5f9; border-radius:16px; padding:18px; margin-bottom:10px}
.pron{color:var(--muted)}
.small{font-size:13px; color:var(--muted)}
.badge{font-size:12px; padding:4px 8px; border-radius:999px; background:#eef2ff}
.confetti{
  position:fixed; inset:0; pointer-events:none; display:flex; align-items:center; justify-content:center;
  font-size:42px; animation:pop .9s ease-out forwards;
}
@keyframes pop{0%{transform:scale(.6);opacity:0}40%{opacity:1}100%{transform:scale(1.2);opacity:0}}
</style>
</head>
<body>

<div class="app">
  <div id="screen"></div>
</div>

<!-- som de acerto -->

<audio id="ding" preload="auto"
src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7a2f3dff9a.mp3?filename=correct-2-46134.mp3"></audio>

<script>
// registrar SW (PWA)
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }

// dados salvos
let data = JSON.parse(localStorage.getItem("triptalk_en")) || {
  points:0, streak:0, progress:0, lesson:0, module:0
};
function save(){ localStorage.setItem("triptalk_en", JSON.stringify(data)); }

// módulos
const modules = [
  {key:"airport", name:"Airport", icon:"✈️"},
  {key:"hotel", name:"Hotel", icon:"🏨"},
  {key:"restaurant", name:"Restaurant", icon:"🍔"},
  {key:"transport", name:"Transportation", icon:"🚕"},
  {key:"shopping", name:"Shopping", icon:"🛍️"},
  {key:"tourism", name:"Tourism", icon:"🗺️"},
  {key:"conversation", name:"Conversation", icon:"💬"},
  {key:"emergency", name:"Emergency", icon:"🚑"},
];

// frases (estrutura pronta p/ expandir até 160)
const lessons = [
  {m:"airport", en:"Where is the airport?", pron:"Uér iz dhi érport", pt:"Onde fica o aeroporto?"},
  {m:"airport", en:"Where is my gate?", pron:"Uér iz mai gueit", pt:"Onde é meu portão?"},
  {m:"restaurant", en:"Can I get the check please?", pron:"Ken ai guét dhi tchek plis", pt:"Posso pedir a conta?"},
  {m:"hotel", en:"I have a reservation.", pron:"Ai rév a rezervêixon", pt:"Eu tenho uma reserva."},
  {m:"transport", en:"Could you call a taxi?", pron:"Kud iu kól a táxi", pt:"Você pode chamar um táxi?"},
  {m:"shopping", en:"How much is this?", pron:"Rau match iz dís", pt:"Quanto custa isso?"},
  {m:"tourism", en:"Where is the museum?", pron:"Uér iz dhi miuziam", pt:"Onde fica o museu?"},
  {m:"conversation", en:"Could you help me?", pron:"Kud iu rélp mi", pt:"Você pode me ajudar?"},
  {m:"emergency", en:"I need a doctor.", pron:"Ai nid a dóctor", pt:"Eu preciso de um médico."},
];

// util
function statsBar(){
  return `
  <div class="top">
    <div class="logo">🌎</div>
    <div class="badge">TripTalk English</div>
  </div>
  <div class="stats">⭐ ${data.points} &nbsp; 🔥 ${data.streak}</div>
  <div class="progress"><div class="bar" style="width:${Math.min(data.progress,100)}%"></div></div>
  `;
}

function home(){
  document.getElementById("screen").innerHTML = `
    ${statsBar()}
    <div class="center">
      <div class="title">TripTalk English</div>
      <div class="subtitle">Não passe sufoco na sua primeira viagem ✈️</div>
      <div class="small">⭐ 160 frases &nbsp; 🎧 Áudio americano &nbsp; 🎤 Pronúncia</div>
      <br/>
      <button class="btn btn-primary big" onclick="menu()">COMEÇAR A TREINAR</button>
      <div class="row">
        <button class="btn btn-back" onclick="resetProgress()">Reiniciar progresso</button>
      </div>
    </div>
  `;
}

function menu(){
  const cards = modules.map(m => `
    <div class="card" onclick="startModule('${m.key}')">
      <b>${m.icon} ${m.name}</b>
      <span class="small">Frases de viagem</span>
    </div>
  `).join("");
  document.getElementById("screen").innerHTML = `
    ${statsBar()}
    <div class="grid">${cards}</div>
    <div class="row">
      <button class="btn btn-back" onclick="home()">← Menu</button>
    </div>
  `;
}

function startModule(key){
  data.module = key;
  // pega primeira lição do módulo
  data.lesson = lessons.findIndex(l => l.m===key);
  if(data.lesson < 0) data.lesson = 0;
  save();
  lesson();
}

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang="en-US"; u.rate=0.9;
  speechSynthesis.speak(u);
}

function listen(){
  try{
    const rec = new (window.SpeechRecognition||window.webkitSpeechRecognition)();
    rec.lang="en-US"; rec.start();
    rec.onresult = e => alert("Você disse: " + e.results[0][0].transcript);
  }catch(e){
    alert("Seu navegador não suporta reconhecimento de voz.");
  }
}

function lesson(){
  const l = lessons[data.lesson];
  document.getElementById("screen").innerHTML = `
    ${statsBar()}
    <div class="lesson">
      <div class="big"><b>${l.en}</b></div>
      <div class="pron">${l.pron}</div>
      <div>${l.pt}</div>
    </div>
    <div class="row">
      <button class="btn btn-audio" onclick="speak('${l.en.replaceAll("'","")}')">🔊 Ouvir</button>
      <button class="btn btn-speak" onclick="listen()">🎤 Falar</button>
    </div>
    <button class="btn btn-quiz" onclick="quiz()">Continuar</button>
    <div class="row">
      <button class="btn btn-back" onclick="menu()">← Menu</button>
    </div>
  `;
}

function quiz(){
  const l = lessons[data.lesson];
  const wrong1 = "Where is the hotel?";
  const wrong2 = "Where is the taxi?";
  document.getElementById("screen").innerHTML = `
    ${statsBar()}
    <div class="lesson center">
      <div class="small">Como dizer:</div>
      <div class="big"><b>${l.pt}</b></div>
    </div>
    <button class="btn btn-quiz" onclick="answer(true)">${l.en}</button>
    <button class="btn btn-quiz" onclick="answer(false)">${wrong1}</button>
    <button class="btn btn-quiz" onclick="answer(false)">${wrong2}</button>
    <div class="row">
      <button class="btn btn-back" onclick="lesson()">← Voltar</button>
    </div>
  `;
}

function answer(correct){
  if(correct){
    // som + confete
    document.getElementById("ding").currentTime = 0;
    document.getElementById("ding").play().catch(()=>{});
    const c = document.createElement("div");
    c.className="confetti"; c.textContent="🎉";
    document.body.appendChild(c); setTimeout(()=>c.remove(),900);

    data.points += 10;
    data.streak += 1;
    data.progress += 5;
    data.lesson = Math.min(data.lesson+1, lessons.length-1);
    save();
    setTimeout(()=>lesson(), 500);
  }else{
    alert("Quase! Tente novamente.");
  }
}

function resetProgress(){
  if(confirm("Tem certeza que deseja reiniciar o progresso?")){
    localStorage.removeItem("triptalk_en");
    data = {points:0, streak:0, progress:0, lesson:0, module:0};
    home();
  }
}

// start
home();
</script>

</body>
</html>
